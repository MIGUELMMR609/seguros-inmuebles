services:
  # Servicio web: backend Node.js (también sirve el frontend en producción)
  - type: web
    name: seguros-inmuebles-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: cd ../frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: seguros-inmuebles-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: seguros-inmuebles-db
    databaseName: seguros_inmuebles
    plan: free
    region: frankfurt
